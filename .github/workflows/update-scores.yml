name: Update Scores

on:
  schedule:
    # Kör var 30:e minut under WSOP-tid (18:00–11:00 UTC = 20:00–13:00 svensk tid)
    - cron: '0,30 18-23 * * *'
    - cron: '0,30 0-11 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 firebase-admin

      - name: Scrape and write to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scrape_scores.py

      - name: Fetch PokerNews live status
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          POKERNEWS_COOKIES: ${{ secrets.POKERNEWS_COOKIES }}
        run: python scrape_pokernews.py

