<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSOP Fantasy 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:      #0a0a0a;
      --dark:       #111111;
      --card:       #181818;
      --card2:      #1f1f1f;
      --border:     #2a2a2a;
      --border2:    #333;
      --gold:       #c9982b;
      --gold-light: #e8b84b;
      --gold-dim:   #6b4f18;
      --white:      #f0f0f0;
      --muted:      #666;
      --muted2:     #888;
      --green:      #3cb371;
      --red-wsop:   #c0392b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      border-bottom: 3px solid var(--gold);
      padding: 0 0 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 20px;
      gap: 20px;
    }

    .logo-suits {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0.7;
    }

    .logo-suits-row {
      display: flex;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--muted2);
    }

    .logo-suits-row .red { color: #a33; }

    .logo-center { text-align: center; }

    .logo-wsop {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4.8rem);
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--gold-light);
      line-height: 1;
      text-transform: uppercase;
    }

    .logo-wsop span {
      color: var(--red-wsop);
    }

    .logo-sub {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 8px;
      color: var(--muted2);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-nav {
      display: flex;
      justify-content: center;
      gap: 0;
      border-top: 1px solid var(--border2);
    }

    .nav-item {
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 20px;
      border-right: 1px solid var(--border);
    }

    .nav-item:first-child { border-left: 1px solid var(--border); }
    .nav-item.active { color: var(--gold); }

    /* ── STATUS ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 20px;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      font-family: 'Oswald', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 16px 80px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    /* ── STANDINGS ── */
    #standings {
      display: flex;
      flex-direction: column;
      margin-bottom: 48px;
    }

    .standing-row {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .standing-row:first-child { border-top: 1px solid var(--border); }
    .standing-row:hover { background: var(--card); }

    .rank-col {
      width: 52px;
      padding: 16px 0 16px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    .rank-1 .rank-col { color: var(--gold-light); }
    .rank-2 .rank-col { color: #b8b8b8; }
    .rank-3 .rank-col { color: #a07848; }

    .name-col {
      flex: 1;
      padding: 16px 12px;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--white);
    }

    .pts-col {
      padding: 16px 20px 16px 0;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      text-align: right;
      min-width: 80px;
    }

    .pts-col small {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      margin-left: 3px;
    }

    .rank-1 .pts-col { color: var(--gold-light); }

    /* ── TEAM CARDS ── */
    #teams {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .team-card {
      background: var(--card);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .team-card:hover { border-color: var(--border2); }

    .team-header {
      padding: 16px 18px;
      border-bottom: 2px solid var(--gold-dim);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .team-owner {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .team-score-wrap { text-align: right; }

    .team-score-num {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .team-score-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
    }

    .player-list { list-style: none; }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid #1e1e1e;
      transition: background 0.1s;
    }

    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: var(--card2); }

    .player-name {
      font-size: 0.9rem;
      font-weight: 300;
      color: #bbb;
      font-style: italic;
    }

    .player-score {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 32px;
      text-align: right;
    }

    .score-positive { color: var(--green); }
    .score-zero { color: #333; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid var(--border);
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      #teams { grid-template-columns: 1fr; gap: 1px; }
      .logo-wsop { letter-spacing: 3px; }
      .logo-sub { letter-spacing: 5px; }
      .logo-suits { display: none; }
      .header-nav { gap: 0; }
      .nav-item { padding: 9px 12px; font-size: 0.62rem; letter-spacing: 2px; }
      .pts-col { font-size: 1.3rem; min-width: 64px; }
      main { padding: 24px 10px 60px; }
      .team-score-num { font-size: 1.8rem; }
      .team-owner { font-size: 1.1rem; }
    }

    @media (max-width: 380px) {
      .nav-item { padding: 8px 8px; font-size: 0.58rem; letter-spacing: 1px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-suits">
      <div class="logo-suits-row"><span>♠</span><span class="red">♥</span></div>
      <div class="logo-suits-row"><span class="red">♦</span><span>♣</span></div>
    </div>
    <div class="logo-center">
      <div class="logo-wsop">WSOP</div>
      <div class="logo-sub">Fantasy · 2026</div>
    </div>
    <div class="logo-suits">
      <div class="logo-suits-row"><span class="red">♦</span><span>♣</span></div>
      <div class="logo-suits-row"><span>♠</span><span class="red">♥</span></div>
    </div>
  </div>
  <div class="header-nav">
    <div class="nav-item active">Ställning</div>
    <div class="nav-item active">Lag</div>
  </div>
</header>

<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="updated">Hämtar poäng...</span>
</div>

<main>

  <div class="section-label">Ställning</div>
  <div id="standings"></div>

  <div class="section-label" style="margin-top:48px">Lag</div>
  <div id="teams"></div>

</main>

<footer>Made by: David Hefner</footer>

<script>
  const TEAMS = [
    {
      owner: "Ante",
      players: [
        "David Peters", "Josh Arieh", "Viktor Blom", "Ryutaro Suzuki",
        "Matt Glantz", "Eli Elezra", "Mike Matusow", "Ben Lamb"
      ]
    },
    {
      owner: "Majscht",
      players: [
        "Jason Koon", "Erik Seidel", "Isaac Haxton", "Ben Lamb",
        "Adam Hendrix", "Phil Hellmuth", "Philip Sternheimer", "Andrew Lichtenberger"
      ]
    },
    {
      owner: "Olle",
      players: [
        "Isaac Haxton", "Sam Soverel", "Alex Foxen", "Jon Turner",
        "Andrew Lichtenberger", "Jason Koon", "Chris Hunichen", "Stephen Chidwick"
      ]
    },
    {
      owner: "Hasse",
      players: [
        "Stephen Song", "John Riordan", "Joao Simao Peres", "Shaun Deeb",
        "Kevin Yun Lam Choi", "Anson Tsang", "Jim Collopy", "Lawrence Brandt"
      ]
    },
    {
      owner: "Dawod",
      players: [
        "Viktor Blom", "Nick Guagenti", "Klemens Roiter", "Isaac Haxton",
        "Andrew Ostapchenko", "Ben Lamb", "Brock Wilson", "Joey Weissman"
      ]
    }
  ];

  function teamTotal(team, scores) {
    return team.players.reduce((sum, p) => sum + (scores[p] || 0), 0);
  }

  function renderStandings(teams, scores) {
    const sorted = [...teams]
      .map(t => ({ ...t, total: teamTotal(t, scores) }))
      .sort((a, b) => b.total - a.total);

    const el = document.getElementById('standings');
    el.innerHTML = sorted.map((t, i) => `
      <div class="standing-row rank-${i + 1}">
        <div class="rank-col">${i + 1}</div>
        <div class="name-col">${t.owner}</div>
        <div class="pts-col">${t.total}<small>pts</small></div>
      </div>`
    ).join('');
  }

  function renderTeams(teams, scores) {
    const el = document.getElementById('teams');
    el.innerHTML = teams.map(team => {
      const total = teamTotal(team, scores);
      const rows = team.players.map(p => {
        const pts = scores[p] || 0;
        const cls = pts > 0 ? 'score-positive' : 'score-zero';
        return `<li class="player-row">
          <span class="player-name">${p}</span>
          <span class="player-score ${cls}">${pts}</span>
        </li>`;
      }).join('');

      return `<div class="team-card">
        <div class="team-header">
          <div class="team-owner">${team.owner}</div>
          <div class="team-score-wrap">
            <div class="team-score-num">${total}</div>
            <span class="team-score-label">poäng</span>
          </div>
        </div>
        <ul class="player-list">${rows}</ul>
      </div>`;
    }).join('');
  }

  async function loadScores() {
    try {
      const res = await fetch('scores.json?v=' + Date.now());
      const data = await res.json();
      const scores = data.players || {};

      renderStandings(TEAMS, scores);
      renderTeams(TEAMS, scores);

      const dot = document.getElementById('status-dot');
      const upd = document.getElementById('updated');
      dot.classList.add('live');
      const d = new Date(data.updated);
      upd.textContent = 'Senast uppdaterad · ' + d.toLocaleString('sv-SE');
    } catch (e) {
      document.getElementById('updated').textContent = 'Kunde inte hämta poäng';
    }
  }

  loadScores();
  setInterval(loadScores, 5 * 60 * 1000);
</script>

</body>
</html>
