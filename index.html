<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSOP Fantasy 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:      #0a0a0a;
      --dark:       #111111;
      --card:       #181818;
      --card2:      #1f1f1f;
      --border:     #2a2a2a;
      --border2:    #333;
      --gold:       #c9982b;
      --gold-light: #e8b84b;
      --gold-dim:   #6b4f18;
      --white:      #f0f0f0;
      --muted:      #666;
      --muted2:     #888;
      --green:      #3cb371;
      --red-wsop:   #c0392b;
      --team-0: #4a9eff;
      --team-1: #e07b39;
      --team-2: #7ec86a;
      --team-3: #c97de0;
      --team-4: #e8b84b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      border-bottom: 3px solid var(--gold);
      padding: 0 0 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 20px;
      gap: 20px;
    }

    .logo-suits {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0.7;
    }

    .logo-suits-row {
      display: flex;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--muted2);
    }

    .logo-suits-row .red { color: #a33; }

    .logo-center { text-align: center; }

    .logo-wsop {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4.8rem);
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--gold-light);
      line-height: 1;
      text-transform: uppercase;
    }

    .logo-wsop span {
      color: var(--red-wsop);
    }

    .logo-sub {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 8px;
      color: var(--muted2);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-bottom-line {
      height: 1px;
      background: var(--border2);
    }

    /* ── STATUS ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 20px;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      font-family: 'Oswald', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 16px 80px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    /* ── STANDINGS ── */
    #standings {
      display: flex;
      flex-direction: column;
      margin-bottom: 48px;
    }

    .standing-row {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .standing-row:first-child { border-top: 1px solid var(--border); }
    .standing-row:hover { background: var(--card); }

    .rank-col {
      width: 52px;
      padding: 16px 0 16px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    .rank-1 .rank-col { color: var(--gold-light); }
    .rank-2 .rank-col { color: #b8b8b8; }
    .rank-3 .rank-col { color: #a07848; }

    .name-col {
      flex: 1;
      padding: 16px 12px;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--white);
    }

    .pts-col {
      padding: 16px 20px 16px 0;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      text-align: right;
      min-width: 80px;
    }

    .pts-col small {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      margin-left: 3px;
    }

    .rank-1 .pts-col { color: var(--gold-light); }

    /* ── TEAM CARDS ── */
    #teams {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .team-card {
      background: var(--card);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .team-card:hover { border-color: var(--border2); }

    .team-card[data-team="0"] { border-top: 2px solid var(--team-0); }
    .team-card[data-team="1"] { border-top: 2px solid var(--team-1); }
    .team-card[data-team="2"] { border-top: 2px solid var(--team-2); }
    .team-card[data-team="3"] { border-top: 2px solid var(--team-3); }
    .team-card[data-team="4"] { border-top: 2px solid var(--team-4); }

    .team-card[data-team="0"] .team-score-num { color: var(--team-0); }
    .team-card[data-team="1"] .team-score-num { color: var(--team-1); }
    .team-card[data-team="2"] .team-score-num { color: var(--team-2); }
    .team-card[data-team="3"] .team-score-num { color: var(--team-3); }
    .team-card[data-team="4"] .team-score-num { color: var(--team-4); }

    .team-header {
      position: relative;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      overflow: hidden;
    }

    .team-header::before {
      content: attr(data-suit);
      position: absolute;
      right: -10px;
      bottom: -18px;
      font-size: 7rem;
      line-height: 1;
      opacity: 0.04;
      pointer-events: none;
      color: var(--gold);
    }

    .team-owner {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .team-score-wrap { text-align: right; }

    .team-score-num {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .team-score-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
    }

    .player-list { list-style: none; }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid #1e1e1e;
      transition: background 0.1s;
    }

    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: var(--card2); }

    .player-name {
      font-size: 0.9rem;
      font-weight: 300;
      color: #bbb;
      font-style: italic;
    }

    .player-score {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 32px;
      text-align: right;
    }

    .score-positive { color: var(--green); }
    .score-zero { color: #333; }

    .player-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      margin-left: 6px;
    }

    .team-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .team-dot[data-team="0"] { background: var(--team-0); }
    .team-dot[data-team="1"] { background: var(--team-1); }
    .team-dot[data-team="2"] { background: var(--team-2); }
    .team-dot[data-team="3"] { background: var(--team-3); }
    .team-dot[data-team="4"] { background: var(--team-4); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid var(--border);
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
    }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      justify-content: center;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 0;
    }

    .tab {
      font-family: 'Oswald', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--muted2); }
    .tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }

    /* ── EVENT LOG ── */
    .event-date-group { margin-bottom: 2px; }

    .event-date-header {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted2);
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 8px 20px;
    }

    .event-row {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom: none;
      transition: background 0.1s;
    }

    .event-row:last-child { border-bottom: 1px solid var(--border); }
    .event-row:hover { background: var(--card); }

    .ev-player {
      flex: 1;
      padding: 11px 12px 11px 20px;
      font-size: 0.9rem;
      font-weight: 300;
      color: #bbb;
      font-style: italic;
    }

    .ev-owners {
      display: flex;
      gap: 4px;
      padding: 11px 8px;
      flex-wrap: wrap;
    }

    .ev-owner-tag {
      font-family: 'Oswald', sans-serif;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: 2px 5px;
    }

    .ev-event {
      padding: 11px 12px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: right;
      min-width: 80px;
    }

    .ev-pts {
      padding: 11px 20px 11px 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      text-align: right;
      min-width: 52px;
    }

    .ev-empty {
      padding: 24px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
      text-align: center;
      border: 1px solid var(--border);
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      #teams { grid-template-columns: 1fr; gap: 1px; }
      .logo-wsop { letter-spacing: 3px; }
      .logo-sub { letter-spacing: 5px; }
      .logo-suits { display: none; }
      .pts-col { font-size: 1.3rem; min-width: 64px; }
      main { padding: 24px 10px 60px; }
      .team-score-num { font-size: 1.8rem; }
      .team-owner { font-size: 1.1rem; }
      .tab-bar { padding: 0 8px; }
      .tab { padding: 12px 14px; font-size: 0.62rem; letter-spacing: 2px; }
      .ev-event { display: none; }
    }

  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-suits">
      <div class="logo-suits-row"><span>♠</span><span class="red">♥</span></div>
      <div class="logo-suits-row"><span class="red">♦</span><span>♣</span></div>
    </div>
    <div class="logo-center">
      <div class="logo-wsop">WSOP</div>
      <div class="logo-sub">Fantasy · 2026</div>
    </div>
    <div class="logo-suits">
      <div class="logo-suits-row"><span class="red">♦</span><span>♣</span></div>
      <div class="logo-suits-row"><span>♠</span><span class="red">♥</span></div>
    </div>
  </div>
  <div class="header-bottom-line"></div>
</header>

<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="updated">Hämtar poäng...</span>
</div>

<nav class="tab-bar">
  <button class="tab active" data-tab="overview">Översikt</button>
  <button class="tab" data-tab="history">Poänghistorik</button>
</nav>

<main>

  <div id="tab-overview">
    <div class="section-label">Ställning</div>
    <div id="standings"></div>

    <div class="section-label" style="margin-top:48px">Lag</div>
    <div id="teams"></div>
  </div>

  <div id="tab-history" style="display:none">
    <div class="section-label">Poänghistorik</div>
    <div id="event-log"></div>
  </div>

</main>

<footer>Made by: David Hefner</footer>

<script type="module">
  const TEAMS = [
    {
      owner: "Ante",
      players: [
        "David Peters", "Josh Arieh", "Viktor Blom", "Ryutaro Suzuki",
        "Matt Glantz", "Eli Elezra", "Mike Matusow", "Ben Lamb"
      ]
    },
    {
      owner: "Majscht",
      players: [
        "Jason Koon", "Erik Seidel", "Isaac Haxton", "Ben Lamb",
        "Adam Hendrix", "Phil Hellmuth", "Philip Sternheimer", "Andrew Lichtenberger"
      ]
    },
    {
      owner: "Olle",
      players: [
        "Isaac Haxton", "Sam Soverel", "Alex Foxen", "Jon Turner",
        "Andrew Lichtenberger", "Jason Koon", "Chris Hunichen", "Stephen Chidwick"
      ]
    },
    {
      owner: "Hasse",
      players: [
        "Stephen Song", "John Riordan", "Joao Simao Peres", "Shaun Deeb",
        "Kevin Yun Lam Choi", "Anson Tsang", "Jim Collopy", "Lawrence Brandt"
      ]
    },
    {
      owner: "Dawod",
      players: [
        "Viktor Blom", "Nick Guagenti", "Klemens Roiter", "Isaac Haxton",
        "Andrew Ostapchenko", "Ben Lamb", "Brock Wilson", "Joey Weissman"
      ]
    }
  ];

  function teamTotal(team, scores) {
    return team.players.reduce((sum, p) => sum + (scores[p] || 0), 0);
  }

  const SUITS = ['♠', '♣', '♥', '♦', '♠'];

  function buildOwnerMap(teams) {
    const map = {};
    for (let i = 0; i < teams.length; i++) {
      for (const p of teams[i].players) {
        if (!map[p]) map[p] = [];
        map[p].push({ index: i, owner: teams[i].owner });
      }
    }
    return map;
  }

  function playerDots(playerName, ownerMap) {
    const entries = ownerMap[playerName] || [];
    if (entries.length === 0) return '';
    const dots = entries.map(e => `<span class="team-dot" data-team="${e.index}" title="${e.owner}"></span>`).join('');
    return `<span class="player-dots">${dots}</span>`;
  }

  function renderStandings(teams, scores) {
    const sorted = [...teams]
      .map((t, i) => ({ ...t, index: i, total: teamTotal(t, scores) }))
      .sort((a, b) => b.total - a.total);

    const el = document.getElementById('standings');
    el.innerHTML = sorted.map((t, i) => `
      <div class="standing-row rank-${i + 1}">
        <div class="rank-col">${i + 1}</div>
        <div class="name-col">${t.owner}</div>
        <div class="pts-col">${t.total}<small>pts</small></div>
      </div>`
    ).join('');
  }

  function renderTeams(teams, scores, ownerMap) {
    const el = document.getElementById('teams');
    el.innerHTML = teams.map((team, ti) => {
      const total = teamTotal(team, scores);
      const rows = team.players.map(p => {
        const pts = scores[p] || 0;
        const cls = pts > 0 ? 'score-positive' : 'score-zero';
        const dots = playerDots(p, ownerMap);
        return `<li class="player-row">
          <span class="player-name">${p}${dots}</span>
          <span class="player-score ${cls}">${pts}</span>
        </li>`;
      }).join('');

      return `<div class="team-card" data-team="${ti}">
        <div class="team-header" data-suit="${SUITS[ti]}">
          <div class="team-owner">${team.owner}</div>
          <div class="team-score-wrap">
            <div class="team-score-num">${total}</div>
            <span class="team-score-label">poäng</span>
          </div>
        </div>
        <ul class="player-list">${rows}</ul>
      </div>`;
    }).join('');
  }

  function renderEventLog(ownerMap, events) {
    const el = document.getElementById('event-log');

    if (!events || events.length === 0) {
      el.innerHTML = '<div class="ev-empty">Inga poäng registrerade ännu</div>';
      return;
    }

    const byDate = {};
    const dateOrder = [];
    for (const ev of events) {
      if (!byDate[ev.date]) {
        byDate[ev.date] = [];
        dateOrder.push(ev.date);
      }
      byDate[ev.date].push(ev);
    }

    el.innerHTML = dateOrder.map(date => {
      const rows = byDate[date].map(ev => {
        const entries = ownerMap[ev.player] || [];
        const dots = entries.map(e => `<span class="team-dot" data-team="${e.index}" title="${e.owner}"></span>`).join('');
        const dotWrap = dots ? `<span class="player-dots">${dots}</span>` : '';
        return `<div class="event-row">
          <div class="ev-player">${ev.player}${dotWrap}</div>
          <div class="ev-event">${ev.event}</div>
          <div class="ev-pts">+${ev.points}</div>
        </div>`;
      }).join('');

      return `<div class="event-date-group">
        <div class="event-date-header">${date}</div>
        ${rows}
      </div>`;
    }).join('');
  }

  // ── FIRESTORE ──
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

  const firebaseApp = initializeApp({
    apiKey: "AIzaSyB-6b-MFxeFlmijA5K-guDNTXeEHSNdpj8",
    projectId: "wsop-54e15"
  });
  const db = getFirestore(firebaseApp);

  function applyData(data) {
    const scores = data.players || {};
    const ownerMap = buildOwnerMap(TEAMS);

    renderStandings(TEAMS, scores);
    renderTeams(TEAMS, scores, ownerMap);
    renderEventLog(ownerMap, data.events || []);

    const dot = document.getElementById('status-dot');
    const upd = document.getElementById('updated');
    dot.classList.add('live');
    const d = new Date(data.updated);
    upd.textContent = 'Senast uppdaterad · ' + d.toLocaleString('sv-SE');
  }

  onSnapshot(doc(db, "scores", "latest"), (snap) => {
    if (snap.exists()) {
      applyData(snap.data());
    } else {
      document.getElementById('updated').textContent = 'Inga poäng ännu';
    }
  }, () => {
    document.getElementById('updated').textContent = 'Kunde inte hämta poäng';
  });

  // Tab switching
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('tab-overview').style.display = tab === 'overview' ? '' : 'none';
      document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
    });
  });
</script>

</body>
</html>
