<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSOP Fantasy 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --felt:        #0b2b1a;
      --felt-mid:    #0f3520;
      --felt-light:  #164a2c;
      --gold:        #c8972a;
      --gold-bright: #f0c040;
      --gold-dim:    #7a5a18;
      --cream:       #f5ead8;
      --cream-dim:   #c4b89a;
      --dark:        #060e08;
      --card-bg:     #0d2417;
      --border:      #1e4a2e;
      --border-gold: #5a3e10;
      --muted:       #5a7a62;
      --green-bright:#3ddc78;
      --red:         #d94f4f;
      --chip-red:    #8b1a1a;
      --chip-blue:   #1a3a6b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--dark);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, #0f3520 0%, transparent 70%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.008) 40px,
          rgba(255,255,255,0.008) 41px
        );
      color: var(--cream);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 56px 20px 48px;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 100% at 50% 0%, #1a5c33 0%, transparent 65%),
        linear-gradient(180deg, #0b2b1a 0%, transparent 100%);
      z-index: 0;
    }

    /* decorative card corners */
    header::after {
      content: '🂡';
      position: absolute;
      top: 12px;
      left: 20px;
      font-size: 3rem;
      opacity: 0.06;
      z-index: 0;
      transform: rotate(-15deg);
    }

    .header-inner { position: relative; z-index: 1; }

    .wsop-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .badge-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .badge-line.right {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .badge-text {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .header-suits {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .suit {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      background: rgba(200, 151, 42, 0.08);
      animation: suitFade 4s ease-in-out infinite;
    }

    .suit:nth-child(1) { animation-delay: 0s; color: var(--cream); }
    .suit:nth-child(2) { animation-delay: 1s; color: #d94f4f; }
    .suit:nth-child(3) { animation-delay: 2s; color: #d94f4f; }
    .suit:nth-child(4) { animation-delay: 3s; color: var(--cream); }

    @keyframes suitFade {
      0%, 100% { opacity: 0.5; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 7vw, 3.8rem);
      font-weight: 900;
      color: var(--gold-bright);
      letter-spacing: 4px;
      text-transform: uppercase;
      line-height: 1;
      text-shadow:
        0 0 40px rgba(240, 192, 64, 0.4),
        0 2px 0 #5a3e10,
        0 4px 12px rgba(0,0,0,0.8);
      margin-bottom: 4px;
    }

    .header-year {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9rem, 3vw, 1.4rem);
      font-weight: 400;
      color: var(--gold-dim);
      letter-spacing: 12px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 0;
    }

    .divider-line {
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-gold));
    }

    .divider-line.r {
      background: linear-gradient(90deg, var(--border-gold), transparent);
    }

    .divider-chip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
    }

    /* ── STATUS BAR ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(11, 43, 26, 0.8);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      letter-spacing: 1px;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.live {
      background: var(--green-bright);
      box-shadow: 0 0 6px var(--green-bright);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green-bright); }
      50% { opacity: 0.4; box-shadow: 0 0 2px var(--green-bright); }
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 16px 80px;
    }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      margin-top: 48px;
    }

    .section-header:first-of-type { margin-top: 0; }

    .section-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-gold), transparent);
    }

    .section-chip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      flex-shrink: 0;
    }

    /* ── STANDINGS ── */
    #standings {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .standing-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 4px;
      transition: all 0.25s ease;
      cursor: default;
    }

    .standing-row:hover {
      background: var(--felt-mid);
      border-color: var(--border-gold);
      transform: translateX(3px);
    }

    .standing-row.rank-1 {
      border-left-color: var(--gold-bright);
      background: linear-gradient(90deg, rgba(200,151,42,0.12), var(--card-bg));
    }

    .standing-row.rank-2 {
      border-left-color: #b0b8b0;
    }

    .standing-row.rank-3 {
      border-left-color: #a07848;
    }

    .rank-num {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .rank-1 .rank-num { color: var(--gold-bright); }
    .rank-2 .rank-num { color: #c0c8c0; }
    .rank-3 .rank-num { color: #b08858; }
    .rank-4 .rank-num, .rank-5 .rank-num { color: var(--muted); }

    .standing-medal {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .standing-name {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.5px;
    }

    .standing-chips {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-right: 8px;
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .standing-pts {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold-bright);
      min-width: 60px;
      text-align: right;
    }

    .standing-pts em {
      font-family: 'Crimson Pro', serif;
      font-style: normal;
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 400;
      margin-left: 3px;
      letter-spacing: 1px;
    }

    /* ── TEAM CARDS ── */
    #teams {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 20px;
    }

    .team-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .team-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--border-gold);
    }

    .team-header {
      position: relative;
      padding: 16px 18px 14px;
      background: linear-gradient(135deg, #0f3520 0%, #0b2b1a 100%);
      border-bottom: 1px solid var(--border-gold);
      overflow: hidden;
    }

    .team-header::before {
      content: '♠';
      position: absolute;
      right: -8px;
      top: -8px;
      font-size: 5rem;
      color: rgba(200, 151, 42, 0.05);
      line-height: 1;
      pointer-events: none;
    }

    .team-owner {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .team-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .team-total {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      text-align: right;
    }

    .team-total-num {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 20px rgba(200, 151, 42, 0.3);
    }

    .team-total-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--gold-dim);
      text-transform: uppercase;
      display: block;
      text-align: right;
    }

    .player-list {
      list-style: none;
    }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid rgba(30, 74, 46, 0.6);
      transition: background 0.15s;
    }

    .player-row:last-child { border-bottom: none; }

    .player-row:hover { background: rgba(15, 53, 32, 0.6); }

    .player-icon {
      font-size: 0.6rem;
      color: var(--muted);
      margin-right: 8px;
      opacity: 0.5;
    }

    .player-name {
      color: var(--cream-dim);
      font-size: 0.95rem;
      font-weight: 300;
      flex: 1;
    }

    .player-score {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }

    .score-positive {
      color: var(--green-bright);
      text-shadow: 0 0 8px rgba(61, 220, 120, 0.4);
    }

    .score-zero { color: rgba(90, 122, 98, 0.5); }

    /* ── BRACELET DECO ── */
    .bracelet-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 24px 0 8px;
      opacity: 0.3;
    }

    .bracelet-bead {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    .bracelet-bead:nth-child(3n) { background: var(--chip-red); }
    .bracelet-bead:nth-child(5n) { background: var(--chip-blue); }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    footer span {
      opacity: 0.5;
    }

    @media (max-width: 640px) {
      #teams { grid-template-columns: 1fr; }
      header { padding: 36px 16px 32px; }
      header h1 { letter-spacing: 2px; }
      .header-year { letter-spacing: 6px; }
      .standing-chips { display: none; }
      .standing-pts { font-size: 1.15rem; min-width: 48px; }
      .standing-name { font-size: 1rem; }
      .team-total-num { font-size: 1.6rem; }
      .team-header { padding: 13px 14px 12px; }
      .team-owner { font-size: 0.95rem; }
      .player-row { padding: 8px 14px; }
      .player-name { font-size: 0.88rem; }
      .section-header { margin-top: 32px; }
      main { padding: 28px 12px 60px; }
      .wsop-badge { gap: 8px; }
      .badge-line { width: 28px; }
    }

    @media (max-width: 380px) {
      .standing-medal { display: none; }
      .rank-num { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wsop-badge">
      <div class="badge-line"></div>
      <span class="badge-text">World Series of Poker</span>
      <div class="badge-line right"></div>
    </div>

    <div class="header-suits">
      <div class="suit">♠</div>
      <div class="suit">♥</div>
      <div class="suit">♦</div>
      <div class="suit">♣</div>
    </div>

    <h1>Fantasy</h1>
    <div class="header-year">2 0 2 6</div>

    <div class="header-divider">
      <div class="divider-line"></div>
      <div class="divider-chip"></div>
      <div class="divider-line r"></div>
    </div>
  </div>
</header>

<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="updated">Hämtar poäng...</span>
</div>

<main>

  <div class="section-header">
    <div class="section-chip"></div>
    <h2>Ställning</h2>
    <div class="section-rule"></div>
  </div>

  <div id="standings"></div>

  <div class="bracelet-bar">
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div><div class="bracelet-bead"></div>
    <div class="bracelet-bead"></div>
  </div>

  <div class="section-header">
    <div class="section-chip"></div>
    <h2>Lag</h2>
    <div class="section-rule"></div>
  </div>

  <div id="teams"></div>

</main>

<footer>
  <span>Made by: David Hefner</span>
</footer>

<script>
  const TEAMS = [
    {
      owner: "Ante",
      players: [
        "David Peters", "Josh Arieh", "Viktor Blom", "Ryutaro Suzuki",
        "Matt Glantz", "Eli Elezra", "Mike Matusow", "Ben Lamb"
      ]
    },
    {
      owner: "Majscht",
      players: [
        "Jason Koon", "Erik Seidel", "Isaac Haxton", "Ben Lamb",
        "Adam Hendrix", "Phil Hellmuth", "Philip Sternheimer", "Andrew Lichtenberger"
      ]
    },
    {
      owner: "Olle",
      players: [
        "Isaac Haxton", "Sam Soverel", "Alex Foxen", "Jon Turner",
        "Andrew Lichtenberger", "Jason Koon", "Chris Hunichen", "Stephen Chidwick"
      ]
    },
    {
      owner: "Hasse",
      players: [
        "Stephen Song", "John Riordan", "Joao Simao Peres", "Shaun Deeb",
        "Kevin Yun Lam Choi", "Anson Tsang", "Jim Collopy", "Lawrence Brandt"
      ]
    },
    {
      owner: "Dawod",
      players: [
        "Viktor Blom", "Nick Guagenti", "Klemens Roiter", "Isaac Haxton",
        "Andrew Ostapchenko", "Ben Lamb", "Brock Wilson", "Joey Weissman"
      ]
    }
  ];

  const MEDALS = ['🥇', '🥈', '🥉', '', ''];
  const CHIP_COLORS = ['#c8972a', '#8b1a1a', '#1a3a6b', '#2a7a2a', '#6b1a6b'];

  function teamTotal(team, scores) {
    return team.players.reduce((sum, p) => sum + (scores[p] || 0), 0);
  }

  function renderStandings(teams, scores) {
    const sorted = [...teams]
      .map(t => ({ ...t, total: teamTotal(t, scores) }))
      .sort((a, b) => b.total - a.total);

    const el = document.getElementById('standings');
    el.innerHTML = sorted.map((t, i) => {
      const chips = CHIP_COLORS.map(c =>
        `<div class="chip-dot" style="background:${c}"></div>`
      ).join('');
      return `
        <div class="standing-row rank-${i + 1}">
          <div class="rank-num">${i + 1}</div>
          <div class="standing-medal">${MEDALS[i]}</div>
          <div class="standing-name">${t.owner}</div>
          <div class="standing-chips">${chips}</div>
          <div class="standing-pts">${t.total}<em>pts</em></div>
        </div>`;
    }).join('');
  }

  function renderTeams(teams, scores) {
    const suits = ['♠', '♥', '♦', '♣', '♠'];
    const el = document.getElementById('teams');
    el.innerHTML = teams.map((team, ti) => {
      const total = teamTotal(team, scores);
      const rows = team.players.map(p => {
        const pts = scores[p] || 0;
        const cls = pts > 0 ? 'score-positive' : 'score-zero';
        return `<li class="player-row">
          <span class="player-icon">◆</span>
          <span class="player-name">${p}</span>
          <span class="player-score ${cls}">${pts}</span>
        </li>`;
      }).join('');

      return `<div class="team-card">
        <div class="team-header" data-suit="${suits[ti % suits.length]}">
          <div>
            <div class="team-owner">${team.owner}</div>
            <div class="team-label">Pick 8 · Las Vegas</div>
          </div>
          <div class="team-total">
            <div class="team-total-num">${total}</div>
            <span class="team-total-label">poäng</span>
          </div>
        </div>
        <ul class="player-list">${rows}</ul>
      </div>`;
    }).join('');

    // set unique suit per card
    document.querySelectorAll('.team-header').forEach(h => {
      h.style.setProperty('--suit-char', `'${h.dataset.suit}'`);
      h.style.cssText += `--suit-char: '${h.dataset.suit}'`;
    });
  }

  async function loadScores() {
    try {
      const res = await fetch('scores.json?v=' + Date.now());
      const data = await res.json();
      const scores = data.players || {};

      renderStandings(TEAMS, scores);
      renderTeams(TEAMS, scores);

      const dot = document.getElementById('status-dot');
      const upd = document.getElementById('updated');
      dot.classList.add('live');
      const d = new Date(data.updated);
      upd.textContent = 'Senast uppdaterad · ' + d.toLocaleString('sv-SE');
    } catch (e) {
      document.getElementById('updated').textContent = 'Kunde inte hämta poäng';
    }
  }

  loadScores();
  setInterval(loadScores, 5 * 60 * 1000);
</script>

</body>
</html>
