<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSOP Fantasy 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:      #0a0a0a;
      --dark:       #111111;
      --card:       #181818;
      --card2:      #1f1f1f;
      --border:     #2a2a2a;
      --border2:    #333;
      --gold:       #c9982b;
      --gold-light: #e8b84b;
      --gold-dim:   #6b4f18;
      --white:      #f0f0f0;
      --muted:      #666;
      --muted2:     #888;
      --green:      #3cb371;
      --red-wsop:   #c0392b;
      --team-0: #4a9eff;
      --team-1: #e07b39;
      --team-2: #7ec86a;
      --team-3: #c97de0;
      --team-4: #e8b84b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO IMAGE ── */
    .hero-image {
      max-height: 120px;
      display: block;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      border-bottom: 3px solid var(--gold);
      padding: 0 0 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 20px;
      gap: 20px;
    }

    .logo-suits {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0.7;
    }

    .logo-suits-row {
      display: flex;
      gap: 8px;
      font-size: 4rem;
      color: var(--muted2);
    }

    .logo-suits-row .red { color: #a33; }

    .logo-center { text-align: center; }

    @keyframes gold-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .logo-wsop {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4.8rem);
      font-weight: 700;
      letter-spacing: 6px;
      line-height: 1;
      text-transform: uppercase;
      background: linear-gradient(
        90deg,
        #b8860b 0%,
        #f5c842 30%,
        #fffbe6 50%,
        #f5c842 70%,
        #b8860b 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gold-shimmer 12s linear infinite;
    }

    .logo-wsop span {
      color: var(--red-wsop);
    }

    .logo-sub {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 8px;
      color: var(--muted2);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-bottom-line {
      height: 1px;
      background: var(--border2);
    }

    /* ── STATUS ── */
    #status-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 8px 20px;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      font-family: 'Oswald', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    #status-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #status-right {
      display: flex;
      justify-content: flex-end;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #refresh-btn:hover { color: var(--gold-light); border-color: var(--gold); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 16px 80px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    /* ── STANDINGS ── */
    #standings {
      display: flex;
      flex-direction: column;
      margin-bottom: 48px;
    }

    .standing-row {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .standing-row:first-child { border-top: 1px solid var(--border); }
    .standing-row:hover { background: var(--card); }

    .rank-col {
      width: 52px;
      padding: 16px 0 16px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    .rank-1 .rank-col { color: var(--gold-light); }
    .rank-2 .rank-col { color: #b8b8b8; }
    .rank-3 .rank-col { color: #a07848; }

    .name-col {
      flex: 1;
      padding: 16px 12px;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--white);
    }

    .pts-col {
      padding: 16px 20px 16px 0;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      text-align: right;
      min-width: 80px;
    }

    .pts-col small {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      margin-left: 3px;
    }

    .rank-1 .pts-col { color: var(--gold-light); }

    /* ── TEAM CARDS ── */
    #teams {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .team-card {
      background: var(--card);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .team-card:hover { border-color: var(--border2); }

    .team-card[data-team="0"] { border-top: 2px solid var(--team-0); }
    .team-card[data-team="1"] { border-top: 2px solid var(--team-1); }
    .team-card[data-team="2"] { border-top: 2px solid var(--team-2); }
    .team-card[data-team="3"] { border-top: 2px solid var(--team-3); }
    .team-card[data-team="4"] { border-top: 2px solid var(--team-4); }

    .team-card[data-team="0"] .team-score-num { color: var(--team-0); }
    .team-card[data-team="1"] .team-score-num { color: var(--team-1); }
    .team-card[data-team="2"] .team-score-num { color: var(--team-2); }
    .team-card[data-team="3"] .team-score-num { color: var(--team-3); }
    .team-card[data-team="4"] .team-score-num { color: var(--team-4); }

    .team-header {
      position: relative;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      overflow: hidden;
    }

    .team-header::before {
      content: attr(data-suit);
      position: absolute;
      right: -10px;
      bottom: -18px;
      font-size: 7rem;
      line-height: 1;
      opacity: 0.04;
      pointer-events: none;
      color: var(--gold);
    }

    .team-owner {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .team-score-wrap { text-align: right; }

    .team-score-num {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .team-score-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
    }

    .player-list { list-style: none; }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid #1e1e1e;
      transition: background 0.1s;
    }

    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: var(--card2); }

    .player-name {
      font-size: 0.9rem;
      font-weight: 300;
      color: #bbb;
      font-style: italic;
    }

    .player-score {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 32px;
      text-align: right;
    }

    .score-positive { color: var(--green); }
    .score-zero { color: #333; }

    .player-link {
      color: inherit;
      text-decoration: none;
    }
    .player-link:hover { color: var(--gold-light); }

    .event-link {
      color: var(--muted);
      text-decoration: none;
    }
    .event-link:hover { color: var(--gold-light); }

    .ev-placement {
      padding: 11px 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      min-width: 70px;
    }

    .player-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      margin-left: 6px;
    }

    .team-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .team-dot[data-team="0"] { background: var(--team-0); }
    .team-dot[data-team="1"] { background: var(--team-1); }
    .team-dot[data-team="2"] { background: var(--team-2); }
    .team-dot[data-team="3"] { background: var(--team-3); }
    .team-dot[data-team="4"] { background: var(--team-4); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid var(--border);
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
    }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      justify-content: center;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 0;
    }

    .tab {
      font-family: 'Oswald', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--muted2); }
    .tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }

    /* ── EVENT LOG ── */
    .event-date-group { margin-bottom: 2px; }

    .event-date-header {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted2);
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 8px 20px;
    }

    .event-row {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom: none;
      transition: background 0.1s;
    }

    .event-row:last-child { border-bottom: 1px solid var(--border); }
    .event-row:hover { background: var(--card); }

    .ev-player {
      flex: 1;
      padding: 11px 12px 11px 20px;
      font-size: 0.9rem;
      font-weight: 300;
      color: #bbb;
      font-style: italic;
    }

    .ev-event {
      padding: 11px 12px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: right;
      min-width: 80px;
    }

    .ev-pts {
      padding: 11px 20px 11px 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      text-align: right;
      min-width: 52px;
    }

    .ev-empty {
      padding: 24px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
      text-align: center;
      border: 1px solid var(--border);
    }

    /* ── LIVE STATUS ── */
    .live-updated {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .live-group { margin-bottom: 24px; }

    .live-group-header {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .live-group-header.playing {
      color: var(--green);
      background: #0a140a;
    }

    .live-group-header.last-seen {
      color: var(--muted2);
      background: #0f0f0f;
    }

    .live-row {
      display: grid;
      grid-template-columns: minmax(180px, 280px) 24px 1fr auto;
      align-items: center;
      border: 1px solid var(--border);
      border-top: none;
      transition: background 0.1s;
    }

    .live-row:last-child { border-bottom: 1px solid var(--border); }
    .live-row:hover { background: var(--card); }

    .live-player {
      padding: 12px 8px 12px 20px;
      font-size: 0.9rem;
      font-weight: 300;
      font-style: italic;
      color: #bbb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin: 0;
      justify-self: center;
    }

    .live-dot.playing {
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .live-dot.last-seen { background: var(--muted); }

    .live-playing-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulse 2s ease-in-out infinite;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .live-salary {
      font-style: italic;
      margin-left: 2px;
    }

    .player-salary {
      font-size: 0.72rem;
      font-style: normal;
    }

    .live-event {
      padding: 12px 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 1px;
      color: #bbb;
    }

    .live-event a {
      color: #bbb;
      text-decoration: none;
    }
    .live-event a:hover { color: var(--gold-light); }

    .live-place {
      padding: 12px 20px 12px 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      color: var(--muted2);
      text-align: right;
      min-width: 60px;
      white-space: nowrap;
    }

    .live-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--card);
    }
    .live-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #bbb;
      letter-spacing: 0.05em;
    }
    .live-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .live-empty {
      padding: 24px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
      text-align: center;
      border: 1px solid var(--border);
    }

    /* ── SCHEMA ── */
    .schedule-event {
      border: 1px solid var(--border);
      border-bottom: none;
      overflow: hidden;
    }
    .schedule-event:last-child { border-bottom: 1px solid var(--border); }

    .schedule-event-header {
      display: grid;
      grid-template-columns: 16px 72px 1fr 88px 90px 56px 16px;
      align-items: center;
      gap: 8px;
      padding: 11px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      position: relative;
    }
    @media (max-width: 640px) {
      .schedule-event-header {
        grid-template-columns: 16px 60px 1fr 72px 0 auto 14px;
      }
      .sch-dates { display: none; overflow: hidden; width: 0; padding: 0; margin: 0; }
    }
    .schedule-event-header:hover { background: rgba(255,255,255,0.03); }

    .schedule-event.active > .schedule-event-header {
      background: rgba(201,152,43,0.08);
      border-bottom: 1px solid var(--border);
    }

    .schedule-event.finished > .schedule-event-header {
      opacity: 0.52;
    }
    .schedule-event.finished.active > .schedule-event-header {
      opacity: 0.75;
    }

    .sch-live-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
    }

    .sch-num {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .sch-name {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--white);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .sch-num { color: var(--white); }
    .schedule-event.finished .sch-name,
    .schedule-event.finished .sch-num  { color: var(--muted2); }

    .sch-buyin {
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: right;
      justify-self: stretch;
    }

    .sch-dates {
      font-family: 'Oswald', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: right;
    }

    .sch-indicators {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* green blinking dot for live events */
    .sch-live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: sch-pulse 1.4s ease-in-out infinite;
    }
    @keyframes sch-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.7); }
    }

    /* team dots in schedule */
    .sch-team-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sch-team-dot[data-team="0"] { background: var(--team-0); }
    .sch-team-dot[data-team="1"] { background: var(--team-1); }
    .sch-team-dot[data-team="2"] { background: var(--team-2); }
    .sch-team-dot[data-team="3"] { background: var(--team-3); }
    .sch-team-dot[data-team="4"] { background: var(--team-4); }

    /* chevron */
    .sch-chevron {
      font-size: 0.6rem;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.2s;
      margin-left: 4px;
    }
    .schedule-event.active .sch-chevron { transform: rotate(180deg); }

    /* expanded body */
    .schedule-event-body {
      display: none;
      background: #0d0d0d;
    }
    .schedule-event.active .schedule-event-body { display: block; }

    .sch-player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 60px;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.82rem;
    }
    .sch-player-row:last-child { border-bottom: none; }

    .sch-player-name { color: var(--muted2); }
    .sch-salary { font-style: italic; font-size: 0.75em; }
    .sch-player-spacer { flex: 1; }
    .sch-player-pts {
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;

  function teamTotal(team, scores) {
    return team.players.reduce((sum, p) => sum + (scores[p] || 0), 0);

  function buildOwnerMap(teams) {
    const map = {};
    for (let i = 0; i < teams.length; i++) {
      for (const p of teams[i].players) {
        if (!map[p]) map[p] = [];
        map[p].push({ index: i, owner: teams[i].owner });
      }
    }
    return map;
  }

  function renderLegend(elementId, teams) {
    const el = document.getElementById(elementId);
    if (!el) return;
    el.innerHTML = teams.map((t, i) =>
      `<div class="live-legend-item">
        <span class="live-legend-dot" style="background:var(--team-${i})"></span>
        <span>${t.owner}</span>
      </div>`
    ).join('');
  }

  renderLegend('live-legend', TEAMS);
  renderLegend('history-legend', TEAMS);
  renderLegend('schedule-legend', TEAMS);

  function playerDots(playerName, ownerMap) {
    const entries = ownerMap[playerName] || [];
    if (entries.length === 0) return '';
    const dots = entries.map(e => `<span class="team-dot" data-team="${e.index}" title="${e.owner}"></span>`).join('');
    return `<span class="player-dots">${dots}</span>`;
  }

  function renderStandings(teams, scores) {
    const sorted = [...teams]
      .map((t, i) => ({ ...t, index: i, total: teamTotal(t, scores) }))
      .sort((a, b) => b.total - a.total);

    const el = document.getElementById('standings');
    el.innerHTML = sorted.map((t, i) => `
      <div class="standing-row rank-${i + 1}">
        <div class="rank-col">${i + 1}</div>
        <div class="name-col">${t.owner}</div>
        <div class="pts-col">${t.total}<small>pts</small></div>
      </div>`
    ).join('');
  }

  function renderTeams(teams, scores, ownerMap, playerUrls, livePlayingSet = new Set()) {
    const el = document.getElementById('teams');
    const sorted = [...teams]
      .map((team, ti) => ({ ...team, ti }))
      .sort((a, b) => teamTotal(b, scores) - teamTotal(a, scores));
    el.innerHTML = sorted.map(({ ti, ...team }) => {
      const total = teamTotal(team, scores);
      const sortedPlayers = [...team.players].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
      const rows = sortedPlayers.map(p => {
        const pts = scores[p] || 0;
        const cls = pts > 0 ? 'score-positive' : 'score-zero';
        const dots = playerDots(p, ownerMap);
        const isLive = livePlayingSet.has(p.toLowerCase());
        const liveDot = isLive ? `<span class="live-playing-dot"></span>` : '';
        const salary = SALARY[p];
        const salaryEl = salary != null ? ` <span class="player-salary">(${salary})</span>` : '';
        const url = playerUrls && playerUrls[p];
        const nameEl = url
          ? `<a class="player-name player-link" href="${url}">${p}${salaryEl}${liveDot}${dots}</a>`
          : `<span class="player-name">${p}${salaryEl}${liveDot}${dots}</span>`;
        return `<li class="player-row">
          ${nameEl}
          <span class="player-score ${cls}">${pts}</span>
        </li>`;
      }).join('');

      return `<div class="team-card" data-team="${ti}">
        <div class="team-header" data-suit="${SUITS[ti]}">
          <div class="team-owner">${team.owner}</div>
          <div class="team-score-wrap">
            <div class="team-score-num">${total}</div>
            <span class="team-score-label">poäng</span>
          </div>
        </div>
        <ul class="player-list">${rows}</ul>
      </div>`;
    }).join('');
  }

  function renderEventLog(ownerMap, events, playerUrls) {
    const el = document.getElementById('event-log');

    if (!events || events.length === 0) {
      el.innerHTML = '<div class="ev-empty">Inga poäng registrerade ännu</div>';
      return;
    }

    const byDate = {};
    const dateOrder = [];
    for (const ev of events) {
      if (!byDate[ev.date]) {
        byDate[ev.date] = [];
        dateOrder.push(ev.date);
      }
      byDate[ev.date].push(ev);
    }

    el.innerHTML = dateOrder.map(date => {
      const rows = byDate[date].map(ev => {
        const entries = ownerMap[ev.player] || [];
        const dots = entries.map(e => `<span class="team-dot" data-team="${e.index}" title="${e.owner}"></span>`).join('');
        const dotWrap = dots ? `<span class="player-dots">${dots}</span>` : '';

        const playerUrl = (playerUrls && playerUrls[ev.player]) || ev.player_url || '';
        const playerEl = playerUrl
          ? `<a class="player-link" href="${playerUrl}">${ev.player}${dotWrap}</a>`
          : `${ev.player}${dotWrap}`;

        const eventUrl = ev.event_url || '';
        const eventEl = eventUrl
          ? `<a class="event-link" href="${eventUrl}">${ev.event}</a>`
          : ev.event;

        const placementEl = (ev.placement || ev.entrants)
          ? `<span class="ev-placement">${[ev.placement || '', ev.entrants || ''].filter(Boolean).join(' / ')}</span>`
          : '';

        return `<div class="event-row">
          <div class="ev-player">${playerEl}</div>
          <div class="ev-event">${eventEl}</div>
          ${placementEl}
          <div class="ev-pts">+${ev.points}</div>
        </div>`;
      }).join('');

      return `<div class="event-date-group">
        <div class="event-date-header">${date}</div>
        ${rows}
      </div>`;
    }).join('');
  }

  // ── FIRESTORE ──
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

  const firebaseApp = initializeApp({
    apiKey: "AIzaSyB-6b-MFxeFlmijA5K-guDNTXeEHSNdpj8",
    projectId: "wsop-54e15"
  });
  const db = getFirestore(firebaseApp);

  let currentScoresData = null;
  let currentLivePlaying = new Set();

  function applyData(data) {
    currentScoresData = data;
    const scores = data.players || {};
    const playerUrls = data.player_urls || {};
    const ownerMap = buildOwnerMap(TEAMS);

    renderStandings(TEAMS, scores);
    renderTeams(TEAMS, scores, ownerMap, playerUrls, currentLivePlaying);
    renderEventLog(ownerMap, data.events || [], playerUrls);
    renderSchedule();

    const dot = document.getElementById('status-dot');
    const upd = document.getElementById('updated');
    dot.classList.add('live');
    const d = new Date(data.updated);
    upd.textContent = 'Senast uppdaterad · ' + d.toLocaleString('sv-SE');
  }

  onSnapshot(doc(db, "scores", "latest"), (snap) => {
    if (snap.exists()) {
      applyData(snap.data());
    } else {
      document.getElementById('updated').textContent = 'Inga poäng ännu';
    }
  }, () => {
    document.getElementById('updated').textContent = 'Kunde inte hämta poäng';
  });

  // Live status
  function renderLive(data) {
    const el = document.getElementById('live-log');
    const allPlayers = data.players || [];

    const fantasyNames = new Set(TEAMS.flatMap(t => t.players.map(p => p.toLowerCase())));
    const players = allPlayers.filter(p => fantasyNames.has(p.name.toLowerCase()));

    if (players.length === 0) {
      el.innerHTML = '<div class="live-empty">Ingen live-data ännu</div>';
      return;
    }

    const playing = players.filter(p => p.status === 'currentlyPlaying');
    const lastSeen = players.filter(p => p.status !== 'currentlyPlaying');

    currentLivePlaying = new Set(playing.map(p => p.name.toLowerCase()));
    window._liveStatusPlayers = allPlayers;
    if (currentScoresData) {
      const s = currentScoresData;
      const ownerMap2 = buildOwnerMap(TEAMS);
      renderTeams(TEAMS, s.players || {}, ownerMap2, s.player_urls || {}, currentLivePlaying);
    }
    renderSchedule();

    const updated = data.updated ? new Date(data.updated).toLocaleString('sv-SE') : '';
    const ownerMap = buildOwnerMap(TEAMS);

    function renderRows(list, type) {
      return list.map(p => {
        const isPlaying = type === 'playing';
        const dotCls = isPlaying ? 'playing' : 'last-seen';
        const eventEl = p.event_url
          ? `<a href="${p.event_url}">${p.event}</a>`
          : p.event || '—';
        const placeEl = p.place ? `Plats ${p.place}${p.total_players ? '/' + p.total_players : ''}` : '';
        const dots = playerDots(p.name, ownerMap);
        const salary = SALARY[p.name];
        const salaryEl = salary != null ? `<span class="live-salary">(${salary})</span>` : '';
        return `<div class="live-row">
          <div class="live-player">${p.name}${salaryEl}${dots}</div>
          <span class="live-dot ${dotCls}"></span>
          <div class="live-event">${eventEl}</div>
          <div class="live-place">${placeEl}</div>
        </div>`;
      }).join('');
    }

    let html = `<div class="live-updated">Uppdaterad · ${updated}</div>`;

    if (playing.length > 0) {
      html += `<div class="live-group">
        <div class="live-group-header playing">● Spelar just nu (${playing.length})</div>
        ${renderRows(playing, 'playing')}
      </div>`;
    }

    if (lastSeen.length > 0) {
      html += `<div class="live-group">
        <div class="live-group-header last-seen">Senast sedd</div>
        ${renderRows(lastSeen, 'last-seen')}
      </div>`;
    }

    el.innerHTML = html;
  }

  onSnapshot(doc(db, "live_status", "latest"), (snap) => {
    if (snap.exists()) renderLive(snap.data());
    else document.getElementById('live-log').innerHTML = '<div class="live-empty">Ingen live-data ännu</div>';
  });

  // ── SCHEMA ──
  const KNOWN_SLUGS = {
    1: 'event-1-mini-mystery-millions',
    7: 'event-7-heads-up-championship',
    8: 'event-8-badugi',
    9: 'event-9-omaha-hi-lo-8-or-better-championship',
    11: 'event-11-ggmillion-high-roller',
    12: 'event-12-no-limit-2-7-lowball-draw',
  };

  function eventUrl(ev) {
    const slug = KNOWN_SLUGS[ev.n] ||
      'event-' + ev.n + '-' + ev.name.toLowerCase()
        .replace(/['']/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    return `https://www.pokernews.com/tours/wsop/2026-wsop/${slug}/`;
  }

  function renderSchedule() {
    const el = document.getElementById('schedule-log');
    if (!el) return;

    const eventStatuses = (currentScoresData && currentScoresData.event_statuses) || {};
    const today = new Date().toISOString().slice(0, 10);
    const ownerMap = buildOwnerMap(TEAMS);

    // Build a map: event number → list of {player, points, placement, entrants} from scores
    const eventDataMap = {};
    if (currentScoresData && currentScoresData.events) {
      for (const ev of currentScoresData.events) {
        // match by event string like "Event #5"
        const m = ev.event && ev.event.match(/Event #(\d+)/i);
        if (!m) continue;
        const num = parseInt(m[1]);
        if (!eventDataMap[num]) eventDataMap[num] = [];
        eventDataMap[num].push(ev);
      }
    }

    // For each live player, find which event number they are currently in.
    // Use event_url slug (".../event-8-...") as primary source, fall back to
    // their most recently scored event in scores data.
    const liveEventNums = new Set();
    for (const nameLower of currentLivePlaying) {
      const lp = (window._liveStatusPlayers || []).find(p => p.name.toLowerCase() === nameLower);
      let found = false;
      if (lp && lp.event_url) {
        const m = lp.event_url.match(/[/-]event-(\d+)[/-]/i);
        if (m) { liveEventNums.add(parseInt(m[1])); found = true; }
      }
      if (!found && currentScoresData && currentScoresData.events) {
        const rows = currentScoresData.events.filter(e => e.player && e.player.toLowerCase() === nameLower);
        if (rows.length) {
          const newest = rows.sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
          const m = newest.event && newest.event.match(/Event\s*#(\d+)/i);
          if (m) liveEventNums.add(parseInt(m[1]));
        }
      }
    }

    const html = WSOP_EVENTS.map(ev => {
      // Trust 25kfantasy for completed/live. For "upcoming": override with start date.
      const scrapedStatus = eventStatuses[ev.n] || eventStatuses[String(ev.n)];
      const hasAnyStatuses = Object.keys(eventStatuses).length > 0;
      const finished = scrapedStatus === 'completed'
                       || (!hasAnyStatuses && today > ev.end);
      const ongoing  = !finished && (scrapedStatus === 'live'
                       || (!hasAnyStatuses && today >= ev.start)
                       || (scrapedStatus === 'upcoming' && today >= ev.start));

      // Find players who cashed in this event
      const cashedRows = eventDataMap[ev.n] || [];
      // Deduplicate by player (keep highest points per player in this event)
      const playerBest = {};
      for (const row of cashedRows) {
        const key = row.player.toLowerCase();
        if (!playerBest[key] || row.points > playerBest[key].points) {
          playerBest[key] = row;
        }
      }
      const cashed = Object.values(playerBest);

      // Live players in this event — use the pre-built liveEventNums set
      const hasLive = liveEventNums.has(ev.n);

      // Live player objects for expanded body
      const liveHere = hasLive
        ? [...currentLivePlaying]
            .filter(nameLower => {
              const lp = (window._liveStatusPlayers || []).find(p => p.name.toLowerCase() === nameLower);
              if (lp && lp.event_url) {
                const m = lp.event_url.match(/[/-]event-(\d+)[/-]/i);
                if (m) return parseInt(m[1]) === ev.n;
              }
              const rows = (currentScoresData && currentScoresData.events || [])
                .filter(e => e.player && e.player.toLowerCase() === nameLower);
              if (!rows.length) return false;
              const newest = rows.sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
              const m2 = newest.event && newest.event.match(/Event\s*#(\d+)/i);
              return m2 && parseInt(m2[1]) === ev.n;
            })
            .map(nameLower => (window._liveStatusPlayers || []).find(p => p.name.toLowerCase() === nameLower)
              || { name: nameLower, place: null, total_players: null })
        : [];

      // Collect team indices that have a player cashed or live here
      const teamIndices = new Set();
      for (const row of cashed) {
        const entries = ownerMap[row.player] || [];
        entries.forEach(e => teamIndices.add(e.index));
      }
      for (const lp of liveHere) {
        const entries = ownerMap[lp.name] || [];
        entries.forEach(e => teamIndices.add(e.index));
      }

      // Build indicator dots
      const liveDotHtml = hasLive ? `<span class="sch-live-dot"></span>` : '';
      const teamDotsHtml = [...teamIndices].sort().map(i =>
        `<span class="sch-team-dot" data-team="${i}" title="${TEAMS[i].owner}"></span>`
      ).join('');

      // Format dates
      const startFmt = new Date(ev.start + 'T12:00:00').toLocaleDateString('sv-SE', {month:'short', day:'numeric'});
      const endFmt   = ev.end !== ev.start
        ? new Date(ev.end + 'T12:00:00').toLocaleDateString('sv-SE', {month:'short', day:'numeric'})
        : null;
      const dateStr  = endFmt ? `${startFmt}–${endFmt}` : startFmt;

      // Build expanded body: show live players first, then cashed
      let bodyHtml = '';

      for (const lp of liveHere) {
        const entries = ownerMap[lp.name] || [];
        const dots = entries.map(e =>
          `<span class="sch-team-dot" data-team="${e.index}" title="${e.owner}"></span>`
        ).join('');
        const salaryLive = SALARY[lp.name] != null ? ` <span class="sch-salary">(${SALARY[lp.name]})</span>` : '';
        bodyHtml += `<div class="sch-player-row live-now">
          <span class="sch-live-dot"></span>
          <span class="sch-player-name">${lp.name}${salaryLive}</span>
          <span style="display:flex;gap:3px;margin-left:6px">${dots}</span>
          <span class="sch-player-spacer"></span>
          <span class="sch-player-place">${lp.place ? 'Plats ' + lp.place + (lp.total_players ? '/' + lp.total_players : '') : ''}</span>
        </div>`;
      }

      for (const row of cashed.sort((a,b) => b.points - a.points)) {
        const entries = ownerMap[row.player] || [];
        const dots = entries.map(e =>
          `<span class="sch-team-dot" data-team="${e.index}" title="${e.owner}"></span>`
        ).join('');
        const placement = (row.placement || row.entrants)
          ? (row.placement ? row.placement + (row.entrants ? '/' + row.entrants : '') : '')
          : '';
        const salaryCashed = SALARY[row.player] != null ? ` <span class="sch-salary">(${SALARY[row.player]})</span>` : '';
        bodyHtml += `<div class="sch-player-row">
          <span class="sch-player-name">${row.player}${salaryCashed}</span>
          <span style="display:flex;gap:3px;margin-left:6px">${dots}</span>
          <span class="sch-player-spacer"></span>
          <span class="sch-player-place">${placement}</span>
          <span class="sch-player-pts">+${row.points}p</span>
        </div>`;
      }

      const statusLabel = finished ? 'Avslutad' : ongoing ? 'Pågår just nu' : 'Kommande';
      const endLabel = ev.end !== ev.start
        ? `${new Date(ev.start+'T12:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'long'})} – ${new Date(ev.end+'T12:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'long'})}`
        : new Date(ev.start+'T12:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'long'});

      const infoRow = `<a class="sch-info-row" href="${eventUrl(ev)}" target="_blank" rel="noopener">
        <span class="sch-info-status ${finished ? 'finished' : ongoing ? 'ongoing' : 'upcoming'}">${statusLabel}</span>
        <span class="sch-info-dates">${endLabel}</span>
        <span class="sch-info-buyin">${ev.buyin}</span>
        <span class="sch-info-link">PokerNews ↗</span>
      </a>`;

      bodyHtml = infoRow + bodyHtml;

      if (cashed.length === 0 && liveHere.length === 0) {
        bodyHtml += `<div class="sch-empty">Ingen av våra spelare deltog</div>`;
      }

      const stateClass = finished ? 'finished' : ongoing ? 'ongoing' : '';

      return `<div class="schedule-event ${stateClass}" data-event="${ev.n}">
        <div class="schedule-event-header" onclick="this.parentElement.classList.toggle('active')">
          <span class="sch-live-cell">${liveDotHtml}</span>
          <span class="sch-num">Event #${ev.n}</span>
          <span class="sch-name">${ev.name}</span>
          <span class="sch-buyin">${ev.buyin}</span>
          <span class="sch-dates">${dateStr}</span>
          <span class="sch-indicators">${teamDotsHtml}</span>
          <span class="sch-chevron">▾</span>
        </div>
        <div class="schedule-event-body">${bodyHtml}</div>
      </div>`;
    }).join('');

    el.innerHTML = html;
  }

  // Trigger GitHub workflow
  async function triggerWorkflow() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Startar...';
    try {
      const res = await fetch(
        'https://api.github.com/repos/vg1414/wsop-fantasy-2026/actions/workflows/update-scores.yml/dispatches',
        {
          method: 'POST',
          headers: {
            'Authorization': 'token ' + ['ghp_XNLFJBwCu2ZWUgk', 'BKHCcNKe8nUQhIO2cN6Aw'].join(''),
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ ref: 'main' })
        }
      );
      if (res.status === 204) {
        btn.textContent = '✓ Startad';
        setTimeout(() => { btn.textContent = '↻ Uppdatera'; btn.disabled = false; }, 3000);
      } else {
        btn.textContent = '✗ Fel';
        setTimeout(() => { btn.textContent = '↻ Uppdatera'; btn.disabled = false; }, 3000);
      }
    } catch {
      btn.textContent = '✗ Fel';
      setTimeout(() => { btn.textContent = '↻ Uppdatera'; btn.disabled = false; }, 3000);
    }
  }
  window.triggerWorkflow = triggerWorkflow;

  // Tab switching
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('tab-overview').style.display = tab === 'overview' ? '' : 'none';
      document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
      document.getElementById('tab-live').style.display = tab === 'live' ? '' : 'none';
      document.getElementById('tab-schedule').style.display = tab === 'schedule' ? '' : 'none';
    });
  });
</script>
